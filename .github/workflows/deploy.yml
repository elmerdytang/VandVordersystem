name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. Deploy frontend to Cloudflare Pages ──────────────────────────────
  deploy-pages:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy order-system --project-name=vv-order-portal --commit-dirty=true

  # ── 2. Apply schema to Supabase (only when supabase/ files change) ───────
  migrate-supabase:
    name: Supabase Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect schema changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            schema:
              - 'order-system/supabase/**'

      - name: Apply schema to Supabase
        if: steps.changes.outputs.schema == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Schema files changed — applying to Supabase..."
          psql "$SUPABASE_DB_URL" -f order-system/supabase/schema.sql
          echo "Done."
