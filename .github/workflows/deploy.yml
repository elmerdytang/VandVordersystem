name: Deploy

on:
  push:
    branches: [main]

# Cloudflare Pages deployment is handled automatically by Cloudflare's
# native GitHub integration — no action needed here for that.
#
# This workflow handles only Supabase schema migrations.

jobs:
  migrate-supabase:
    name: Supabase Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect schema changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            schema:
              - 'order-system/supabase/**'

      - name: Apply schema to Supabase
        if: steps.changes.outputs.schema == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Schema files changed — applying to Supabase..."
          psql "$SUPABASE_DB_URL" -f order-system/supabase/schema.sql
          echo "Done."
